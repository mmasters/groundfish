services:
  groundfish:
    build:
      context: .
      args:
        # Override SF_ARCH for your host if desired (e.g. x86-64-bmi2, armv8).
        SF_ARCH: ${SF_ARCH:-x86-64-sse41-popcnt}
    image: groundfish:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      STOCKFISH_ENGINE_PATH: /usr/local/bin/stockfish
      STOCKFISH_LOG_FILE: /app/logs/groundfish.log
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
